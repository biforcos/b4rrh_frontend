                  $ref: '#/components/schemas/AddressResponse'
        '404':
          description: Rule system or employee not found

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/addresses/{addressNumber}:
    get:
      operationId: getAddressByBusinessKey
      summary: Get employee address by business key
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
