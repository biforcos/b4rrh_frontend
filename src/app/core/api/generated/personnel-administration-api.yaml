          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
        - in: path
          name: workCenterAssignmentNumber
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Work center assignment found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkCenterResponse'
        '404':
          description: Rule system, employee, or work center assignment not found

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/work-centers/{workCenterAssignmentNumber}/close:
    post:
      operationId: closeWorkCenterByBusinessKey
      summary: Close employee work center assignment by business key
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
        - in: path
          name: workCenterAssignmentNumber
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseWorkCenterRequest'
      responses:
        '200':
          description: Work center assignment closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkCenterResponse'
        '400':
          description: Invalid request
        '404':
          description: Rule system, employee, or work center assignment not found
        '409':
          description: >-
            The work center assignment is already closed, or the resulting closed period
            is not fully contained within any of the employee's active presence periods.

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/cost-centers:
    post:
      operationId: createCostCenterByBusinessKey
      summary: Create employee cost center allocation by business key
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCostCenterRequest'
      responses:
        '201':
          description: Cost center allocation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostCenterResponse'
        '400':
          description: Invalid request
        '404':
          description: Rule system, employee, or catalog not found
        '409':
          description: >-
            Cost center overlap exists for the same employee and cost center code,
            or the requested period is not fully contained within employee presence history.
    get:
      operationId: listEmployeeCostCentersByBusinessKey
      summary: List employee cost center allocations by business key
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      responses:
        '200':
          description: Cost center allocation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CostCenterResponse'
        '404':
          description: Rule system or employee not found

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/cost-centers/{costCenterCode}/{startDate}:
    get:
      operationId: getCostCenterByBusinessKey
      summary: Get employee cost center allocation by business key
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
        - in: path
          name: costCenterCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: startDate
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Cost center allocation found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostCenterResponse'
        '404':
          description: Rule system, employee, or cost center allocation not found
    put:
      operationId: updateCostCenterByBusinessKey
      summary: Update employee cost center allocation by business key
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
        - in: path
          name: costCenterCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: startDate
          required: true
          schema:
            type: string
            format: date
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCostCenterRequest'
      responses:
        '200':
          description: Cost center allocation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostCenterResponse'
        '400':
          description: Invalid request
        '404':
          description: Rule system, employee, or cost center allocation not found
        '409':
          description: >-
            Cost center allocation is already closed,
            or the resulting period is outside employee presence history.

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/cost-centers/{costCenterCode}/{startDate}/close:
    post:
      operationId: closeCostCenterByBusinessKey
      summary: Close employee cost center allocation by business key
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
