openapi: 3.0.3
info:
  title: B4RRHH Personnel Administration API
  version: 0.1.0

paths:
  /employees:
    get:
      operationId: listEmployees
      summary: List or search employees for directory reads
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
            maxLength: 100
          description: Free text search over employee number and name-related fields.
        - in: query
          name: ruleSystemCode
          required: false
          schema:
            type: string
            maxLength: 5
        - in: query
          name: employeeTypeCode
          required: false
          schema:
            type: string
            maxLength: 30
        - in: query
          name: status
          required: false
          schema:
            type: string
            maxLength: 30
        - in: query
          name: size
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 200
          description: Page size limit. Defaults to 50.
        - in: query
          name: page
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
          description: Zero-based page index. Defaults to 0.
      responses:
        '200':
          description: Employee directory list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmployeeDirectoryItemResponse'
        '400':
          description: Invalid query parameters
    post:
      operationId: createEmployee
      summary: Create employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmployeeRequest'
      responses:
        '201':
          description: Employee created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}:
    get:
      operationId: getEmployeeByBusinessKey
      summary: Get employee by business key
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      responses:
        '200':
          description: Employee found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
        '404':
          description: Rule system or employee not found

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/presences:
    post:
      operationId: createPresenceByBusinessKey
      summary: Create employee presence by business key
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePresenceRequest'
      responses:
        '201':
          description: Presence created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresenceResponse'
        '400':
          description: Invalid request
        '404':
          description: Rule system, employee, or catalog not found
        '409':
          description: Presence business conflict
    get:
      operationId: listEmployeePresencesByBusinessKey
      summary: List employee presences by business key
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      responses:
        '200':
          description: Presence list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PresenceResponse'
        '404':
          description: Rule system or employee not found

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/presences/{presenceNumber}:
    get:
      operationId: getPresenceByBusinessKey
      summary: Get employee presence by business key
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
        - in: path
          name: presenceNumber
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Presence found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresenceResponse'
        '404':
          description: Rule system, employee, or presence not found

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/presences/{presenceNumber}/close:
    post:
      operationId: closePresenceByBusinessKey
      summary: Close employee presence by business key
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
        - in: path
          name: presenceNumber
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClosePresenceRequest'
      responses:
        '200':
          description: Presence closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresenceResponse'
        '400':
          description: Invalid request
        '404':
          description: Rule system, employee, or presence not found
        '409':
          description: Presence already closed

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/addresses:
