  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/work-centers:
    post:
      operationId: createWorkCenterByBusinessKey
      summary: Create employee work center assignment by business key
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkCenterRequest'
      responses:
        '201':
          description: Work center assignment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkCenterResponse'
        '400':
          description: Invalid request
        '404':
          description: Rule system, employee, or catalog not found
        '409':
          description: >-
            The requested period overlaps an existing work center assignment for this employee,
            or the period [startDate, endDate] is not fully contained within any of the
            employee's active presence periods.
    get:
      operationId: listEmployeeWorkCentersByBusinessKey
      summary: List employee work center assignments by business key
      parameters:
        - in: path
          name: ruleSystemCode
          required: true
          schema:
            type: string
            maxLength: 5
        - in: path
          name: employeeTypeCode
          required: true
          schema:
            type: string
            maxLength: 30
        - in: path
          name: employeeNumber
          required: true
          schema:
            type: string
            maxLength: 15
      responses:
        '200':
          description: Work center assignment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkCenterResponse'
        '404':
          description: Rule system or employee not found

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/work-centers/{workCenterAssignmentNumber}:
    get:
      operationId: getWorkCenterByBusinessKey
      summary: Get employee work center assignment by business key
      parameters:
