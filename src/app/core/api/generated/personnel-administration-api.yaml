components:
  schemas:
    CreateEmployeeRequest:
      type: object
      required:
        - ruleSystemCode
        - employeeTypeCode
        - employeeNumber
        - firstName
        - lastName1
      properties:
        ruleSystemCode:
          type: string
          maxLength: 5
        employeeTypeCode:
          type: string
          maxLength: 30
        employeeNumber:
          type: string
          maxLength: 15
        firstName:
          type: string
          maxLength: 100
        lastName1:
          type: string
          maxLength: 100
        lastName2:
          type: string
          maxLength: 100
          nullable: true
        preferredName:
          type: string
          maxLength: 300
          nullable: true

    EmployeeResponse:
      type: object
      required:
        - id
        - ruleSystemCode
        - employeeTypeCode
        - employeeNumber
        - firstName
        - lastName1
        - status
      properties:
        id:
          type: integer
          format: int64
        ruleSystemCode:
          type: string
        employeeTypeCode:
          type: string
        employeeNumber:
          type: string
        firstName:
          type: string
        lastName1:
          type: string
        lastName2:
          type: string
          nullable: true
        preferredName:
          type: string
          nullable: true
        status:
          type: string

    EmployeeDirectoryItemResponse:
      type: object
      required:
        - ruleSystemCode
        - employeeTypeCode
        - employeeNumber
        - displayName
        - status
      properties:
        ruleSystemCode:
          type: string
          maxLength: 5
        employeeTypeCode:
          type: string
          maxLength: 30
        employeeNumber:
          type: string
          maxLength: 15
        displayName:
          type: string
          description: Preferred name when available, otherwise composed from first/last names.
        status:
          type: string
          maxLength: 30
        workCenterCode:
          type: string
          maxLength: 30
          nullable: true
          description: Active work center assignment code on current date, when available.

    CreatePresenceRequest:
      type: object
      required:
        - companyCode
        - entryReasonCode
        - startDate
      properties:
        companyCode:
          type: string
          maxLength: 4
        entryReasonCode:
          type: string
          maxLength: 30
        exitReasonCode:
          type: string
          maxLength: 30
          nullable: true
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
    ClosePresenceRequest:
      type: object
      required:
        - endDate
      properties:
        endDate:
          type: string
          format: date
        exitReasonCode:
          type: string
          maxLength: 30
          nullable: true
    PresenceResponse:
      type: object
      required:
        - presenceNumber
        - companyCode
        - entryReasonCode
        - startDate
      properties:
        presenceNumber:
          type: integer
          format: int32
        companyCode:
          type: string
        entryReasonCode:
          type: string
        exitReasonCode:
          type: string
          nullable: true
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
    CreateAddressRequest:
      type: object
      additionalProperties: false
      required:
        - addressTypeCode
        - street
        - city
        - countryCode
        - startDate
      properties:
        addressTypeCode:
          type: string
          maxLength: 30
        street:
          type: string
          maxLength: 300
        city:
          type: string
          maxLength: 120
        countryCode:
          type: string
          maxLength: 3
          description: ISO 3166-1 alpha-3 code validated against active COUNTRY rule entities for the employee ruleSystemCode.
        postalCode:
          type: string
          maxLength: 20
          nullable: true
        regionCode:
          type: string
          maxLength: 30
          nullable: true
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
    CloseAddressRequest:
      type: object
      additionalProperties: false
      required:
        - endDate
      properties:
        endDate:
          type: string
          format: date
    AddressResponse:
      type: object
      required:
        - addressNumber
        - addressTypeCode
        - street
        - city
        - countryCode
        - startDate
      properties:
        addressNumber:
          type: integer
          format: int32
        addressTypeCode:
          type: string
        street:
          type: string
        city:
          type: string
        countryCode:
          type: string
          description: ISO 3166-1 alpha-3 code from COUNTRY rule entities in the employee ruleSystemCode catalog.
        postalCode:
          type: string
          nullable: true
        regionCode:
          type: string
          nullable: true
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
    CreateWorkCenterRequest:
      type: object
      additionalProperties: false
      required:
        - workCenterCode
        - startDate
      properties:
        workCenterCode:
          type: string
          maxLength: 30
          description: Code validated against active WORK_CENTER rule entities for the employee ruleSystemCode.
        startDate:
          type: string
          format: date
          description: >-
            Start date of the work center assignment (yyyy-MM-dd). Must fall within
            an existing employee presence period. Same-day validity (startDate == endDate) is allowed.
        endDate:
          type: string
          format: date
          nullable: true
          description: >-
            Optional end date (yyyy-MM-dd). When provided, must be >= startDate and the period
            [startDate, endDate] must be fully contained within a single employee presence period.
    CloseWorkCenterRequest:
      type: object
      additionalProperties: false
      required:
        - endDate
      properties:
        endDate:
          type: string
          format: date
          description: >-
            Date on which the assignment ends (yyyy-MM-dd). Must be >= the assignment's startDate.
            The resulting period [startDate, endDate] must be fully contained within
            an existing employee presence period.
    WorkCenterResponse:
      type: object
      required:
        - workCenterAssignmentNumber
        - workCenterCode
        - startDate
      properties:
        workCenterAssignmentNumber:
          type: integer
          format: int32
        workCenterCode:
          type: string
          description: Code from active WORK_CENTER rule entities in the employee ruleSystemCode catalog.
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
    CreateCostCenterRequest:
      type: object
      additionalProperties: false
      required:
        - costCenterCode
        - allocationPercentage
        - startDate
      properties:
        costCenterCode:
          type: string
          maxLength: 30
          description: Code validated against active COST_CENTER rule entities for the employee ruleSystemCode.
        allocationPercentage:
          type: number
          format: double
          description: Allocation percentage greater than 0 and less than or equal to 100.
        startDate:
          type: string
          format: date
          description: Start date of the cost center allocation (yyyy-MM-dd).
        endDate:
          type: string
          format: date
          nullable: true
