            format: int32
      responses:
        '200':
          description: Address found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponse'
        '404':
          description: Rule system, employee, or address not found

  /employees/{ruleSystemCode}/{employeeTypeCode}/{employeeNumber}/addresses/{addressNumber}/close:
    post:
      operationId: closeAddressByBusinessKey
      summary: Close employee address by business key
      parameters:
        - in: path
          name: ruleSystemCode
