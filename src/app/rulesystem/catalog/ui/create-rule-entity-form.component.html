<form class="create-rule-entity-form" [formGroup]="form" (ngSubmit)="submit()">
  <label>
    <span>{{ texts.createCodeLabel }}</span>
    <input type="text" formControlName="code" maxlength="30" (input)="markInteraction()" />
    @if (form.controls.code.touched && form.controls.code.hasError('required')) {
      <small class="create-rule-entity-form__error">{{ texts.createCodeRequired }}</small>
    }
    @if (form.controls.code.touched && form.controls.code.hasError('maxlength')) {
      <small class="create-rule-entity-form__error">{{ texts.createCodeMaxLength }}</small>
    }
  </label>

  <label>
    <span>{{ texts.createNameLabel }}</span>
    <input type="text" formControlName="name" maxlength="100" (input)="markInteraction()" />
    @if (form.controls.name.touched && form.controls.name.hasError('required')) {
      <small class="create-rule-entity-form__error">{{ texts.createNameRequired }}</small>
    }
    @if (form.controls.name.touched && form.controls.name.hasError('maxlength')) {
      <small class="create-rule-entity-form__error">{{ texts.createNameMaxLength }}</small>
    }
  </label>

  <label>
    <span>{{ texts.createDescriptionLabel }}</span>
    <textarea formControlName="description" maxlength="500" rows="3" (input)="markInteraction()"></textarea>
    @if (form.controls.description.touched && form.controls.description.hasError('maxlength')) {
      <small class="create-rule-entity-form__error">{{ texts.createDescriptionMaxLength }}</small>
    }
  </label>

  <label>
    <span>{{ texts.createStartDateLabel }}</span>
    <input type="date" formControlName="startDate" (change)="markInteraction()" />
    @if (form.controls.startDate.touched && form.controls.startDate.hasError('required')) {
      <small class="create-rule-entity-form__error">{{ texts.createStartDateRequired }}</small>
    }
  </label>

  <label>
    <span>{{ texts.createEndDateLabel }}</span>
    <input type="date" formControlName="endDate" (change)="markInteraction()" />
  </label>

  @if (hasRangeError()) {
    <small class="create-rule-entity-form__error">{{ texts.createEndDateInvalidRange }}</small>
  }

  <div class="create-rule-entity-form__actions">
    <button type="submit" [disabled]="creating()">
      @if (creating()) {
        {{ texts.creatingMessage }}
      } @else {
        {{ texts.createSubmitAction }}
      }
    </button>
  </div>
</form>
