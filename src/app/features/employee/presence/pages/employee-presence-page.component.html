<section class="employee-area" [attr.aria-label]="texts.laborAreaLabel">
  <div class="employee-area__state-stack">
    @if (laborAreaLoading()) {
      <p class="employee-area__state">{{ texts.laborLoadingMessage }}</p>
    }

    @if (presencesError() === 'request-failed') {
      <p class="employee-area__state employee-area__state--error">{{ texts.presenceLoadFailedMessage }}</p>
    }
  </div>

  <div class="employee-area__modules">
    <section class="employee-area__module">
      <app-employee-presence-block [presence]="presenceBlockModel()" />
    </section>
  </div>
</section>
