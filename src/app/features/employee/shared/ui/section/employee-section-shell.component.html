<section class="employee-section-shell" [attr.data-mode]="state().mode">
  <header class="employee-section-shell__header">
    <div class="employee-section-shell__heading">
      <h3 class="employee-section-shell__title">{{ title() }}</h3>
      @if (hasSubtitle()) {
        <p class="employee-section-shell__subtitle">{{ subtitle() }}</p>
      }
    </div>

    <div class="employee-section-shell__header-actions">
      <ng-content select="[sectionShellHeaderActions]"></ng-content>
    </div>
  </header>

  <div class="employee-section-shell__body">
    <ng-content></ng-content>
  </div>

  @if (hasFooterState()) {
    <footer class="employee-section-shell__footer" role="status" aria-live="polite">
      @if (showBusy()) {
        <p class="employee-section-shell__status employee-section-shell__status--busy">Procesando cambios...</p>
      }

      @if (showError()) {
        <p class="employee-section-shell__status employee-section-shell__status--error">
          {{ state().errorMessage }}
        </p>
      }

      @if (showSuccess()) {
        <p class="employee-section-shell__status employee-section-shell__status--success">
          {{ state().successMessage }}
        </p>
      }
    </footer>
  }
</section>
