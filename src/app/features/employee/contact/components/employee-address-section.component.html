<app-temporal-section
  [title]="texts.addressesSectionTitle"
  [subtitle]="sectionSubtitle"
  [state]="sectionState()"
  [displayMode]="displayMode()"
  [rows]="rows()"
  [texts]="sectionTexts"
  [confirmingCloseKey]="confirmingCloseKey()"
  [editingCurrentKey]="editingCurrentKey()"
  [canCreate]="true"
  [canEditCurrent]="true"
  [canClose]="true"
  [createSubmitEnabled]="isCreateDraftValid()"
  [editSubmitEnabled]="isEditCurrentDraftValid()"
  (manageStarted)="startManage()"
  (manageExited)="exitManage()"
  (createStarted)="startCreate()"
  (editCurrentStarted)="startEditCurrent($event)"
  (closeRequested)="requestCloseCurrent($event)"
  (closeConfirmed)="confirmCloseCurrent($event)"
  (cancelled)="cancel()"
  (createSubmitted)="submitCreate()"
  (editCurrentSubmitted)="submitEditCurrent()"
>
  <div temporalCreateForm class="employee-address-section__form-grid">
    <label>
      <span>{{ texts.addressesSectionTypeLabel }}</span>
      <input type="text" [value]="createDraft().addressTypeCode" (input)="updateCreateField('addressTypeCode', $any($event.target).value)" />
    </label>

    <label>
      <span>{{ texts.addressesSectionStreetLabel }}</span>
      <input type="text" [value]="createDraft().street" (input)="updateCreateField('street', $any($event.target).value)" />
    </label>

    <label>
      <span>{{ texts.addressesSectionCityLabel }}</span>
      <input type="text" [value]="createDraft().city" (input)="updateCreateField('city', $any($event.target).value)" />
    </label>

    <label>
      <span>{{ texts.addressesSectionCountryLabel }}</span>
      <input type="text" [value]="createDraft().countryCode" (input)="updateCreateField('countryCode', $any($event.target).value)" />
    </label>

    <label>
      <span>{{ texts.addressesSectionStartDateLabel }}</span>
      <input type="date" [value]="createDraft().startDate" (input)="updateCreateField('startDate', $any($event.target).value)" />
    </label>

    <label>
      <span>{{ texts.addressesSectionPostalCodeLabel }}</span>
      <input type="text" [value]="createDraft().postalCode" (input)="updateCreateField('postalCode', $any($event.target).value)" />
    </label>

    <label>
      <span>{{ texts.addressesSectionRegionLabel }}</span>
      <input type="text" [value]="createDraft().regionCode" (input)="updateCreateField('regionCode', $any($event.target).value)" />
    </label>
  </div>

  <div temporalEditCurrentForm class="employee-address-section__form-grid">
    @if (currentAddress(); as currentAddress) {
      <p class="employee-address-section__edit-hint">{{ texts.addressesSectionEditCurrentHint }}</p>
      <div class="employee-address-section__readonly-grid">
        <p>
          <span>{{ texts.addressesSectionTypeLabel }}</span>
          <strong>{{ currentAddress.addressTypeCode }}</strong>
        </p>
        <p>
          <span>{{ texts.addressesSectionStartDateLabel }}</span>
          <strong>{{ currentAddress.startDate }}</strong>
        </p>
      </div>
    }

    <label>
      <span>{{ texts.addressesSectionStreetLabel }}</span>
      <input type="text" [value]="editCurrentDraft().street" (input)="updateEditCurrentField('street', $any($event.target).value)" />
    </label>

    <label>
      <span>{{ texts.addressesSectionCityLabel }}</span>
      <input type="text" [value]="editCurrentDraft().city" (input)="updateEditCurrentField('city', $any($event.target).value)" />
    </label>

    <label>
      <span>{{ texts.addressesSectionCountryLabel }}</span>
      <input type="text" [value]="editCurrentDraft().countryCode" (input)="updateEditCurrentField('countryCode', $any($event.target).value)" />
    </label>

    <label>
      <span>{{ texts.addressesSectionPostalCodeLabel }}</span>
      <input type="text" [value]="editCurrentDraft().postalCode" (input)="updateEditCurrentField('postalCode', $any($event.target).value)" />
    </label>

    <label>
      <span>{{ texts.addressesSectionRegionLabel }}</span>
      <input type="text" [value]="editCurrentDraft().regionCode" (input)="updateEditCurrentField('regionCode', $any($event.target).value)" />
    </label>
  </div>
</app-temporal-section>
