<app-editable-slot-section
  [title]="texts.identifiersSectionTitle"
  [subtitle]="sectionSubtitle"
  [state]="sectionState()"
  [displayMode]="displayMode()"
  [rows]="rows()"
  [texts]="slotTexts"
  [draft]="draft()"
  [editingKey]="editingKey()"
  [deletingKey]="deletingKey()"
  [availableKeys]="availableKeys()"
  [canCreate]="true"
  [canEdit]="true"
  [canDelete]="true"
  (manageStarted)="startManage()"
  (manageExited)="exitManage()"
  (createStarted)="startCreate()"
  (editStarted)="startEdit($event)"
  (deleteRequested)="requestDelete($event)"
  (deleteConfirmed)="confirmDelete($event)"
  (cancelled)="cancel()"
  (draftKeyChanged)="updateDraftKey($event)"
  (draftValueChanged)="updateDraftValue($event)"
  (createSubmitted)="submitCreate($event)"
  (editSubmitted)="submitEdit($event)"
/>
